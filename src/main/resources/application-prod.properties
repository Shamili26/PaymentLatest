# ─────────────────────────────────────────────────────────────────────────────
# PRODUCTION profile — activate with: --spring.profiles.active=prod
#
# Secrets are loaded from AWS Secrets Manager at startup via spring.config.import.
# The referenced secret must be a JSON document whose keys match the property
# placeholders used in application.properties, e.g.:
#
#   Secret name: payment-app/prod   (override with AWS_SECRET_NAME)
#   {
#     "spring.datasource.url":      "jdbc:postgresql://<rds-endpoint>:5432/paymentdb",
#     "spring.datasource.username": "postgres",
#     "spring.datasource.password": "<password>",
#     "app.jwt.secret":             "<base64-encoded-256-bit-key>"
#   }
#
# The application's IAM role/instance profile must grant
# secretsmanager:GetSecretValue on that secret. No credentials are stored here.
# ─────────────────────────────────────────────────────────────────────────────

spring.config.import=aws-secretsmanager:${AWS_SECRET_NAME:payment-app/prod}

# AWS region used by both Secrets Manager and SNS.
cloud.aws.region.static=${AWS_REGION:us-east-1}
cloud.aws.stack.auto=false

# --- SMS (AWS SNS) ---
# Selects the real SnsSmsSender bean (LoggingSmsSender is disabled under 'prod').
app.sms.aws.region=${AWS_REGION:us-east-1}
# Optional alphanumeric/registered Sender ID shown to recipients.
app.sms.aws.sender-id=${SMS_SENDER_ID:PAYFLOW}
# Transactional SMS are delivered with higher priority/reliability.
app.sms.aws.sms-type=${SMS_TYPE:Transactional}
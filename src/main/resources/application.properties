spring.application.name=payment-app-backend

# --- Database ---
# When deployed (prod profile active), DB_URL/DB_USERNAME/DB_PASSWORD are loaded
# from AWS Secrets Manager (see the prod section at the bottom of this file) and
# resolved by the placeholders below. Without the prod profile (tests / local
# dev) the defaults apply, so the test suite never contacts AWS.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver


# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
# Resolved from the JWT_SECRET key in AWS Secrets Manager when the prod profile
# is active (see the prod section at the bottom of this file).
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=86400000

# --- MFA (payment OTP) ---
app.mfa.otp.expiry-seconds=300


app.mfa.otp.max-attempts=3

# --- Jackson ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.date-format=yyyy-MM-dd

# --- Server ---
server.port=8084
server.error.include-message=always

# --- CORS ---
app.cors.allowed-origins=http://localhost:5173,https://d1o9xb625jkgbk.cloudfront.net

# --- Logging ---
logging.level.com.paymentapp=DEBUG
logging.level.org.springframework.security=INFO

# Directory where log files are written (see logback-spring.xml).
# Defaults to a "logs" folder next to the running app. Override per environment, e.g.:
#   Linux  : --log.path=/var/log/payment-app   (or env var LOG_PATH=/var/log/payment-app)
#   Windows: --log.path=C:/payment-app/logs
log.path=logs
log.file.name=payment-app

#-------------------------------------------------------------------------------
# PROD profile — activate on the deployed environment with the env property
# SPRING_PROFILES_ACTIVE=prod (or --spring.profiles.active=prod). Kept in this
# single file as a profile-gated document so the test suite never loads it.
#
# Loads the DB credentials and JWT secret from AWS Secrets Manager. The secret
# (name overridable via AWS_SECRET_NAME) is a JSON document with these keys,
# which the placeholders elsewhere in this file resolve:
#   DB_URL, DB_USERNAME, DB_PASSWORD, JWT_SECRET
# The instance's IAM role must grant secretsmanager:GetSecretValue, and the SMS
# OTP beans (SnsSmsSender/AwsSnsConfig) activate under this profile too.
#-------------------------------------------------------------------------------
#---
spring.config.activate.on-profile=prod
spring.config.import=aws-secretsmanager:${AWS_SECRET_NAME:payment-app/prod}
# NOTE: awspring 2.4 ignores spring.cloud.aws.region.static for the config-data
# import, so the AWS region is supplied to the SDK via -Daws.region in the
# Procfile. On EB, credentials come from the instance IAM role (IMDS).
cloud.aws.stack.auto=false

# --- SMS (AWS SNS) — real OTP delivery under prod ---
app.sms.aws.region=${AWS_REGION:us-east-1}
app.sms.aws.sender-id=${SMS_SENDER_ID:PAYFLOW}
app.sms.aws.sms-type=${SMS_TYPE:Transactional}

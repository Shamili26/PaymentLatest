spring.application.name=payment-app-backend

# --- Database ---
# Secrets are NEVER hardcoded here. Spring Boot binds these properties from the
# standard SPRING_DATASOURCE_* environment variables via relaxed binding, so no
# custom placeholders are needed:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
# In production the values come from AWS Secrets Manager (see
# application-prod.properties, activated with --spring.profiles.active=prod).
# The values below are local-development defaults for a localhost Postgres and
# are overridden by any of the above environment variables when present.
spring.datasource.url=jdbc:postgresql://localhost:5432/paymentdb
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
# Loaded from AWS Secrets Manager in prod; from the JWT_SECRET env var locally.
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=86400000

# --- MFA (payment OTP) ---
app.mfa.otp.expiry-seconds=300
app.mfa.otp.max-attempts=3

# --- Jackson ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.date-format=yyyy-MM-dd

# --- Server ---
server.port=8084
server.error.include-message=always

# --- CORS ---
app.cors.allowed-origins=http://localhost:5173,https://d1o9xb625jkgbk.cloudfront.net

# --- Logging ---
logging.level.com.paymentapp=DEBUG
logging.level.org.springframework.security=INFO

# Directory where log files are written (see logback-spring.xml).
# Defaults to a "logs" folder next to the running app. Override per environment, e.g.:
#   Linux  : --log.path=/var/log/payment-app   (or env var LOG_PATH=/var/log/payment-app)
#   Windows: --log.path=C:/payment-app/logs
log.path=logs
log.file.name=payment-app
